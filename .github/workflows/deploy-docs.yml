name: Deploy Fleting Docs
on:
  push:
    branches:
      - main 

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install mkdocs mkdocs-material mkdocs-static-i18n

      - name: Build and Deploy
        run: |
          mkdocs gh-deploy --force --clean --remote-branch www

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}